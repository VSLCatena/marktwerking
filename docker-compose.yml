services:
    marktwerking.pma:
        container_name: marktwerking.pma
        hostname: pma
        image: ghcr.io/linuxserver/phpmyadmin
        profiles:
            - dev
        environment:
            PMA_HOST: '${DB_HOST:-db}'
            PMA_USER: root
            PMA_PASSWORD: '${DB_ROOT_PASSWORD:-db}'
            TZ: Europe/Amsterdam
        ports:
            - '4081:80'
        volumes:
            - 'pmadata:/config'
        restart: unless-stopped
        networks:
            - net
    marktwerking.db:
        hostname: db
        container_name: marktwerking.db
        image: 'yobasystems/alpine-mariadb:latest'
        environment:
            MYSQL_ROOT_PASSWORD: '${DB_ROOT_PASSWORD:-db}'
            MYSQL_DATABASE: '${DB_DATABASE:-marktwerking}'
            MYSQL_USER: '${DB_USERNAME:-dbuser}'
            MYSQL_PASSWORD: '${DB_PASSWORD:-dbpass}'
        volumes:
            - 'dbdata:/var/lib/mysql/'
        volumes_from:
            - 'marktwerking.php:ro'
        networks:
            - net
        restart: unless-stopped
    marktwerking.php:
        hostname: php
        image: 'ghcr.io/vslcatena/marktwerking:latest'
        labels:
          - "traefik.enable=true"
          - "traefik.docker.network=REVERSE_PROXY"
          - "traefik.http.routers.${PROJECT}.rule=Host(`${PROJECT_FQDN}`)"
          - "traefik.http.routers.${PROJECT}.entrypoints=${PROJECT_ENTRYPOINT}"
          - "traefik.http.routers.${PROJECT}.tls.domains[0].main=${PROJECT_DOMAIN_MAIN}"
          - "traefik.http.routers.${PROJECT}.tls.domains[0].sans=${PROJECT_DOMAIN_SANS}"
          - "traefik.http.routers.${PROJECT}.tls.certresolver=${PROJECT_CERT_RESOLVER}"
          - "traefik.http.routers.${PROJECT}.middlewares=${PROJECT}-whitelist@docker"
          - "traefik.http.middlewares.${PROJECT}-whitelist.ipallowlist.sourcerange=${PROJECT_IP_WHITELIST}"
          - "traefik.http.services.${PROJECT}.loadbalancer.server.port=80"
        pull_policy: if_not_present
        build:
            context: ./src
            dockerfile: Dockerfile
            args:
                - 'DEPLOY_ENV="production"'
        container_name: marktwerking.php
        environment:
            MW_DB_HOST: '${DB_HOST:-db}'
            MW_DB_USERNAME: '${DB_USERNAME:-dbuser}'
            MW_DB_PASSWORD: '${DB_PASSWORD:-dbpass}'
            MW_DB_DATABASE: '${DB_DATABASE:-marktwerking}'
            MW_BAR_PASSWORD: '${MW_ADMIN_PASSWORD:-MW23}'
            MW_IP_WHITELIST: '${MW_IP_WHITELIST:-"192.168.4.0/24,192.168.40.0/24"}'
            MW_DEBUG: '${MW_DEBUG:-0}'
            TITLE: 'Marktwerking 2023'
        tty: true
#        ports:
#            - '${MW_CHOST_IP:-0.0.0.0}:${MW_PORT:-4080}:80'
        networks:
            - net
            - REVERSE_PROXY
networks:
    REVERSE_PROXY:
      external: true
    net:
        driver: bridge
        ipam:
            driver: default
            config:
                - { subnet: '${MW_NET:-192.168.32.0/29}' }
        driver_opts:
            com.docker.network.bridge.name: marktw_net
volumes:
    dbdata:
        driver: local
    pmadata:
        driver: local
